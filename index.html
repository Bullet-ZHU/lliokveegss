<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淡粉色交互页面</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 自定义 Tailwind 配置，增加介于 100 和 200 之间的 pink-150 色值
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            150: '#fce0ec', 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 移动端交互优化基础样式 */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const photo = document.getElementById('photo');
            const message = document.getElementById('message');
            const btnGroup = document.getElementById('btnGroup');
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');

            let rightClicks = 0;
            const MAX_CLICKS = 4;

            function updateTransforms() {
                const rc = Math.min(rightClicks, MAX_CLICKS);

                // 右按钮：每次右移 38px 并缩小
                const rt = rc * 38;
                const rs = Math.max(0.35, 1 - rc * 0.16);
                btnNo.style.transform = `translateX(${rt}px) scale(${rs})`;

                // 左按钮：略微右移并变大（保持间距平衡）
                const lt = rc * 14;
                const ls = 1 + rc * 0.12;
                btnYes.style.transform = `translateX(${lt}px) scale(${ls})`;
            }

            btnYes.addEventListener('click', function() {
                photo.src = 'YES.jpg';
                btnGroup.style.display = 'none';
                message.textContent = '我也喜欢你！';
                message.className = 'text-black text-3xl font-[\'SimHei\',\'Microsoft_YaHei\',sans-serif] font-bold tracking-widest';
            });

            btnNo.addEventListener('click', function() {
                rightClicks++;
                photo.src = 'NO.png';

                const texts = ['这样不好吧', '？你是认真的吗 ', ' 要不再想想', '不许'];
                if (rightClicks <= MAX_CLICKS) {
                    btnNo.textContent = texts[rightClicks - 1];
                }

                if (rightClicks >= MAX_CLICKS) {
                    btnNo.style.pointerEvents = 'none';
                }
                updateTransforms();
            });
        });
    </script>
</head>
<body class="bg-pink-150 h-screen w-full flex flex-col overflow-hidden px-6">

    <!-- 上方图片区域 -->
    <div class="h-[55%] w-full flex flex-col items-center justify-end pb-8">
        <img id="photo" src="begin.png" alt="可爱的小黄" class="w-32 h-32 object-cover drop-shadow-md border-4 border-white/60 rounded-3xl">
    </div>

    <!-- 文字区域 -->
    <div class="w-full text-center mb-10">
        <p id="message" class="text-black text-xl font-['SimHei','Microsoft_YaHei',sans-serif] font-bold tracking-widest">喜不喜欢朱子涵</p>
    </div>

    <!-- 按钮区域 -->
    <div id="btnGroup" class="w-full flex items-center justify-between px-4">
        <button id="btnYes" class="w-28 h-12 bg-pink-300 text-black text-lg font-['SimHei','Microsoft_YaHei',sans-serif] rounded-2xl shadow-sm border border-pink-400/50" style="transition:transform 0.25s ease">喜欢</button>
        <button id="btnNo" class="w-28 h-12 bg-blue-200 text-black text-lg font-['SimHei','Microsoft_YaHei',sans-serif] rounded-2xl shadow-sm border border-blue-300/50" style="transition:transform 0.25s ease">不喜欢</button>
    </div>

</body>
</html>
